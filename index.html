<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>联系客服</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    text-align:center;
    padding:35px 25px;
}

.title{
    font-size:28px;
    font-weight:600;
    color:#222;
}

.desc{
    margin-top:12px;
    color:#666;
    font-size:15px;
    line-height:24px;
}

.qrcode{
    width:280px;
    max-width:100%;
    margin:30px auto;
    display:block;
    border-radius:12px;
}

.tip{
    color:#999;
    font-size:15px;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">

        <div class="title">
            联系客服
        </div>

        <div class="desc">
            欢迎添加客服微信<br>
            有任何问题欢迎咨询
        </div>

        <img
            id="wxCode"
            class="qrcode"
            src="wx1.jpg"
            alt="客服二维码">

        <div class="tip">
            长按识别二维码添加客服
        </div>

    </div>
</div>

<script>
const images = [
    "wx1.jpg",
    "wx2.png"
];

// 每次打开页面随机显示一张二维码
const random = Math.floor(Math.random() * images.length);
document.getElementById("wxCode").src = images[random];
</script>

</body>
</html>
