<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>联系客服</title>
<style>
body {
  margin: 0;
  background: #fff;
  font-family: Arial, sans-serif;
}

.box {
  text-align: center;
  padding-top: 45px;
}

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 18px;
}

.qrcode {
  width: 240px;
  max-width: 75%;
}

.tip {
  font-size: 14px;
  color: #666;
  margin-top: 18px;
}
</style>
</head>

<body>
  <div class="box">
    <div class="title">添加客服微信</div>

    <img class="qrcode" id="wxCode" src="wx1.jpg">

    <div class="tip">长按二维码识别添加</div>
  </div>

<script>
const images = ["wx1.jpg", "wx2.png"];
const randomIndex = Math.floor(Math.random() * images.length);
document.getElementById("wxCode").src = images[randomIndex];
</script>

</body>
</html>
