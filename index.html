<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>联系客服</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#f7f7f7;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

.container{
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    text-align:center;
}

.card h2{
    font-size:28px;
    margin-bottom:30px;
}

.card img{
    width:320px;
    max-width:80vw;
    border-radius:12px;
}

.card p{
    color:#666;
    font-size:16px;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

    <div class="card">

        <h2>添加客服微信</h2>

        <img id="wxCode" src="wx1.jpg">

        <p>长按二维码识别添加</p>

    </div>

</div>

<script>
const images=[
    "wx1.jpg",
    "wx2.png"
];

const i=Math.floor(Math.random()*images.length);

document.getElementById("wxCode").src=images[i];
</script>

</body>
</html>
