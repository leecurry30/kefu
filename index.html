<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>联系客服</title>
</head>
<body>

<div style="text-align:center;margin-top:50px;">
    <h2>添加客服微信</h2>

    <img id="wxCode" src="wx1.jpg" width="300">

    <p>长按二维码识别添加</p>
</div>

<script>
    const images = ["wx1.jpg", "wx2.png"];
    let index = 0;

    setInterval(() => {
        index = (index + 1) % images.length;
        document.getElementById("wxCode").src = images[index];
    }, 3000); // 3秒切换一次
</script>

</body>
</html>
